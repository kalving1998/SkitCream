<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Recuperar contraseña | SkitCream</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="../css/variables.css" />
    <link rel="stylesheet" href="../css/reset.css" />
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/hero.css" />
    <link rel="stylesheet" href="../css/authentication.css" />
    <link rel="stylesheet" href="../css/responsive.css" />
  </head>

  <body>
    <section class="auth-page">
      <!-- Columna izquierda: decorativa -->
      <div class="auth-visual">
        <a href="../index.html" class="auth-logo">
          <img src="../assets/images/logo/skit.jpg" alt="Logo SkitCream" />
        </a>
        <h2>¿Olvidaste tu contraseña?</h2>
        <p>
          No te preocupes, le pasa a todos. Escribe tu correo y te enviaremos
          instrucciones para crear una nueva.
        </p>
      </div>

      <!-- Columna derecha: formulario -->
      <div class="auth-form-box">
        <div class="auth-form-content">
          <h1>Recuperar contraseña</h1>
          <p class="auth-subtitle">
            ¿Recordaste tu contraseña?
            <a href="login.html">Inicia sesión</a>
          </p>

          <form class="auth-form">
            <label for="email">Correo electrónico</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="tucorreo@ejemplo.com"
              required
            />

            <button type="submit" class="btn btn-primary auth-submit">
              Enviar instrucciones
            </button>
          </form>
        </div>
      </div>
    </section>

    <script src="../js/app.js"></script>
  </body>
</html>
