<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Iniciar sesión | SkitCream</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="../css/variables.css" />
    <link rel="stylesheet" href="../css/reset.css" />
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/hero.css" />
    <link rel="stylesheet" href="../css/authentication.css" />
    <link rel="stylesheet" href="../css/responsive.css" />
  </head>

  <body>
    <section class="auth-page">
      <!-- Columna izquierda: decorativa -->
      <div class="auth-visual">
        <a href="../index.html" class="auth-logo">
          <img src="../assets/images/logo/skit.jpg" alt="Logo SkitCream" />
        </a>
        <h2>Bienvenido a SkitCream</h2>
        <p>
          Inicia sesión para ver tus pedidos, guardar tus favoritos ,celebrar
          fechas importantes y pedir más rápido la próxima vez.
        </p>
      </div>

      <!-- Columna derecha: formulario -->
      <div class="auth-form-box">
        <div class="auth-form-content">
          <h1>Iniciar sesión</h1>
          <p class="auth-subtitle">
            ¿Aún no tienes cuenta?
            <a href="registro.html">Regístrate</a>
          </p>

          <form class="auth-form">
            <label for="email">Correo electrónico</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="tucorreo@ejemplo.com"
              required
            />

            <label for="password">Contraseña</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="••••••••"
              required
            />

            <a href="recuperar.html" class="auth-forgot">
              ¿Olvidaste tu contraseña?
            </a>

            <button type="submit" class="btn btn-primary auth-submit">
              Iniciar sesión
            </button>
          </form>
        </div>
      </div>
    </section>

    <script src="../js/app.js"></script>
  </body>
</html>
